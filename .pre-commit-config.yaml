repos:
  - repo: local
    hooks:
      - id: config-check
        name: generated config artifacts
        entry: npm run config:check
        language: system
        pass_filenames: false
      - id: format-check
        name: format check
        entry: npm run format:check
        language: system
        pass_filenames: false
      - id: lint
        name: lint
        entry: npm run lint
        language: system
        pass_filenames: false
